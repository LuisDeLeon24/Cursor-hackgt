<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Telescopio Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c1008;
      --ink-soft: #3a2414;
      --brass-deep: #8a6230;
      --blood: #5c1a10;
      --wood: #1a0e08;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--wood);
      font-family: 'IM Fell English', Georgia, serif;
      color: var(--ink);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vw, 2rem);
    }

    .stage-bg {
      position: absolute;
      inset: 0;
      background: url('assets/nautical-desk.png') center 42% / cover no-repeat;
      transform: scale(1.04);
      filter: saturate(1.05) contrast(1.05);
    }

    .stage-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 78% 18%, rgba(255, 200, 120, 0.22), transparent 32%),
        radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(8, 4, 2, 0.6) 100%),
        linear-gradient(180deg, rgba(10, 6, 3, 0.4) 0%, transparent 30%, transparent 65%, rgba(8, 4, 2, 0.55) 100%);
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 720px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: clamp(1rem, 2.5vh, 1.6rem);
      padding: clamp(1.6rem, 4vh, 2.8rem) clamp(1.4rem, 4vw, 2.6rem);
      background:
        linear-gradient(165deg, rgba(245, 230, 190, 0.84) 0%, rgba(220, 185, 120, 0.78) 50%, rgba(180, 140, 80, 0.76) 100%);
      border: 3px solid rgba(42, 24, 10, 0.75);
      box-shadow:
        0 0 0 1px rgba(201, 164, 106, 0.45),
        0 0 0 10px rgba(26, 14, 8, 0.5),
        0 24px 70px rgba(0, 0, 0, 0.75),
        inset 0 0 60px rgba(90, 50, 20, 0.15);
      backdrop-filter: blur(1.5px);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background: url('assets/nautical-desk.png') center 48% / 160% no-repeat;
      filter: sepia(0.35) contrast(1.1) brightness(1.15);
      mix-blend-mode: multiply;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    .card > * { position: relative; z-index: 1; }

    .label {
      font-family: 'Special Elite', monospace;
      font-size: clamp(0.7rem, 1.3vw, 0.9rem);
      letter-spacing: 0.32em;
      color: var(--brass-deep);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Pirata One', cursive;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      line-height: 1.05;
      color: var(--ink);
      text-shadow:
        0 1px 0 rgba(255, 235, 180, 0.55),
        0 0 28px rgba(255, 200, 120, 0.2);
    }

    .desc {
      max-width: 28ch;
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      line-height: 1.4;
      color: var(--ink-soft);
      font-style: italic;
    }

    .qr-wrap {
      width: clamp(180px, 28vh, 260px);
      padding: 0.65rem;
      background: linear-gradient(145deg, #fffef8, #f0e2c0);
      border: 2px solid rgba(42, 24, 10, 0.7);
      box-shadow:
        0 0 0 4px rgba(138, 98, 48, 0.35),
        0 10px 28px rgba(0, 0, 0, 0.35),
        0 0 40px rgba(255, 200, 120, 0.15);
    }

    .qr-wrap img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: pixelated;
    }

    .url {
      font-family: 'Special Elite', monospace;
      font-size: clamp(0.8rem, 1.4vw, 1rem);
      letter-spacing: 0.06em;
      color: var(--blood);
    }

    @media (max-width: 520px) {
      body { overflow: auto; }
      .stage { height: auto; min-height: 100%; }
      .stage-bg { position: fixed; }
    }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="stage-bg" aria-hidden="true"></div>

    <article class="card">
      <p class="label">TelescopioAR</p>
      <h1>El Telescopio Digital</h1>
      <p class="desc">
        Apunta al cielo, caza la ISS en tiempo real y descifra la transmisión pirata.
      </p>

      <figure class="qr-wrap">
        <img
          src="assets/qr-sextantar.jpeg"
          alt="QR hacia El Telescopio Digital"
          width="240"
          height="240"
        />
      </figure>

      <p class="url">sextantar.vercel.app</p>
    </article>
  </div>
</body>
</html>
